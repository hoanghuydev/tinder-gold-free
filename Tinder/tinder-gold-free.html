<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/content.css">
    <link rel="stylesheet" href="js/content.js">
    <title>Tinder Gold</title>
</head>
<body>
        <div class="container">
            <div class="background-filter backgr-filter-hide">
                <div class="filter-table filter-hide">
                    <p class="filter-title">Filter</p>
                    <div class="separator"></div>
                    <label for="name">Enter name</label>
                    <input type="text" id="name">
                    <div class="separator"></div>
                    <label for="year">Enter year of birth</label>
                    <input type="number" id="year">
                    <div class="separator"></div>
                    <p class="close-filter">CANCEL</p>
                </div>
            </div>
            <header>
                <div class="search">
                    <input type="number" class="num-of-people" placeholder="Enter num of people to check">
                    <button class="btn-search btn">Search</button>
                </div>
                <div class="btn btn-unblur">Unblur</div>
            </header>
            <img src="images/filter.png" class="filter">
        </img>
            <div class="searching">Searching...3/4</div>
            <div class="content">
                <div class="all-profile">
                    <div class="profile">
                        <p class="pass-profile">x</p>
                        <div class="distance-mi">3 kilomet</div>
                        <div class="user-bio">Day la bio cua toi asdjg dshfkd shafa kshfdf hsdkfas dfadf adsf</div>
                        <div class="user">
                            <div class="user-name">Huynh Chi</div>
                            <div class="user-birthday">2003</div>
                        </div>
                    </div>
                </div>
            </div> 
        </div>
</body>
</html>
